<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>AI Failure Tickets</title>
</head>
<body>
<div id="tc-wrapper">

    <div id="tc-header">
        <div>
            <div id="tc-title">&#x26A1; AI Failure Tickets</div>
            <div id="tc-subtitle">Manage provisioning failure tickets inside IdentityIQ</div>
        </div>
        <div id="tc-actions">
            <button class="tc-btn secondary" onclick="TicketUI.loadTickets()">&#x21BB; Refresh</button>
            <button class="tc-btn accent" onclick="TicketUI.downloadTickets()">&#x2B07; Download CSV</button>
            <button class="tc-btn" onclick="TicketUI.seedSample()">&#x2B; Create Sample Ticket</button>
        </div>
    </div>

    <div id="tc-summary-bar" class="tc-summary-bar"></div>

    <div class="tc-grid">

        <div class="tc-card">
            <div class="tc-card-header">
                <span>Tickets</span>
                <span id="tc-filter-label" style="font-size:11px;color:#8898b4;font-weight:400;"></span>
            </div>
            <div class="tc-card-body">
                <div class="tc-filters">
                    <select id="tc-status-filter" class="tc-select" style="max-width:180px;">
                        <option value="">All Statuses</option>
                        <option value="OPEN">OPEN</option>
                        <option value="ASSIGNED">ASSIGNED</option>
                        <option value="RESOLVED">RESOLVED</option>
                    </select>
                    <button class="tc-btn secondary" onclick="TicketUI.applyFilter()">Apply</button>
                </div>
                <div id="tc-ticket-table"></div>
            </div>
        </div>

        <div class="tc-card tc-detail-sticky">
            <div class="tc-card-header">
                <span>Ticket Details &amp; Chatter</span>
                <span id="tc-detail-ticket-id" style="font-size:12px;color:#8898b4;"></span>
            </div>
            <div class="tc-card-body" id="tc-ticket-detail">
                <div class="tc-empty">Select a ticket to view details.</div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
